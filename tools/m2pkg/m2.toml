# m2.toml - m2pkg package manifest (self-hosting)
name=m2pkg
version=0.1.0
entry=src/Main.mod
edition=m2plus
includes=src
extra-c=../../libs/m2sys/m2sys.c

[deps]
m2http=path:../../libs/m2http
m2auth=path:../../libs/m2auth

[cc]

[cc.feature.MACOS]
cflags=-I/opt/homebrew/opt/openssl@3/include
ldflags=-L/opt/homebrew/opt/openssl@3/lib
