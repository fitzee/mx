# m2.toml - m2stream: Transport-agnostic byte stream
#
# Unifies TCP sockets and TLS sessions behind a single interface.
# Provides both sync (try-once) and async (Future-returning) APIs.
manifest_version=1
name=m2stream
version=0.2.0
edition=pim4
entry=src/Stream.mod
includes=src

[test]
entry=tests/stream_e2e.mod

[deps]
m2futures=path:../m2futures
m2evloop=path:../m2evloop
m2sockets=path:../m2sockets
m2tls=path:../m2tls

[cc]
libs=-lssl -lcrypto
