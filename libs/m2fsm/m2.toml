# m2.toml - m2fsm: Table-driven finite state machine library
#
# Dense transition table with O(1) lookup, optional guards,
# per-transition actions, state entry/exit hooks, and trace.
# No heap allocation in core runtime.
manifest_version=1
name=m2fsm
version=0.1.0
edition=pim4
entry=src/Fsm.mod
includes=src

[deps]

[test]
entry=tests/fsm_tests.mod

[cc]
