# m2.toml - m2http package manifest
manifest_version=1
name=m2http
version=0.1.2
edition=pim4
entry=src/HTTPClient.mod
includes=src

[deps]
m2futures=path:../m2futures
m2evloop=path:../m2evloop
m2sockets=path:../m2sockets
m2tls=path:../m2tls
m2stream=path:../m2stream
m2http2=path:../m2http2
m2bytes=path:../m2bytes

[cc]
extra-c=src/dns_bridge.c
libs=-lssl -lcrypto
