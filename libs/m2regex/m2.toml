# m2.toml - m2regex: POSIX regex wrapper
#
# Regular expression matching via POSIX regex.h.
# Uses extended regex syntax (REG_EXTENDED) by default.
# No extra libraries needed — uses system regex.h.
manifest_version=1
name=m2regex
version=0.1.0
edition=pim4
entry=src/Regex.mod
includes=src

[deps]

[test]
entry=tests/regex_tests.mod

[cc]
extra-c=src/regex_bridge.c
