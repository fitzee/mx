# m2.toml - m2fmt: JSON/CSV/table output formatting library
#
# Mini JSON writer, CSV field encoder, and text table renderer.
# All output written to caller-provided buffers.  No heap allocation.
manifest_version=1
name=m2fmt
version=0.1.1
edition=pim4
entry=src/Fmt.mod
includes=src

[deps]

[test]
entry=tests/fmt_tests.mod

[cc]
