# m2.toml - m2log: Structured logging library
#
# Level-filtered, sink-dispatched logging with key/value fields.
# No heap allocation in the log path.  Fixed buffers throughout.
# Core depends only on InOut and Strings (built into the compiler).
# FileSink additionally requires m2sys (extra-c below).
# StreamSink additionally requires m2stream (add to your own build).
manifest_version=1
name=m2log
version=1.0.1
edition=pim4
entry=src/Log.mod
includes=src

[deps]

[test]
entry=tests/log_tests.mod

[cc]
extra-c=../m2sys/m2sys.c
